name: Production Slot Duplicate Check

on:
  schedule:
    # Every 30 minutes — Talend generates slots every 15 min, 30 min gives buffer
    - cron: "*/30 * * * *"
  workflow_dispatch: # Manual trigger

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Hopemark checks 6 locations × 2 services — needs more time

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check for duplicate slots on production
        id: slot_check
        run: mkdir -p prod-results && npx playwright test --config=playwright.config.prod.js
        env:
          SETTER_BASE_URL: https://setter.layline.live
        continue-on-error: true

      - name: Generate detailed email report
        if: always()
        run: |
          node scripts/slot-check-report.mjs \
            prod-results \
            "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            slot-check-email.html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slot-check-results
          path: |
            prod-results/
            slot-check-email.html
          retention-days: 7

      - name: Send duplicate slot alert email
        if: steps.slot_check.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DUPLICATE SLOTS DETECTED on Production — ${{ github.run_id }}"
          to: praveen.c@jseven.in, kkropp@layline.live, msrinivasan@layline.live
          from: GitHub Actions
          html_body: file://slot-check-email.html
