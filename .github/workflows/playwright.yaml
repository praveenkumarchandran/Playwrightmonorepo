name: Playwright Tests

on:
  push:
    branches:
      - main
      - stage
      - dev
  pull_request:
    branches:
      - main
      - stage
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  # ── SINY tests — run on every push (dev, stage, main) ────────────────────
  test-siny:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [siny-medical, siny-cosmetic]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm install --prefix frontend
      - run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.project }}
          path: test-results/
          retention-days: 14

  # ── Full suite — only on main / stage / PRs (not dev) ────────────────────
  test-full:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage' || github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [tndi, clarus, hopemark, kronson]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm install --prefix frontend
      - run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.project }}
          path: test-results/
          retention-days: 14

  # ── Email notification after all jobs ─────────────────────────────────────
  notify:
    needs: [test-siny, test-full]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Set result
        id: result
        run: |
          if [ "${{ needs.test-siny.result }}" == "success" ] && \
             [ "${{ needs.test-full.result }}" != "failure" ]; then
            echo "status=All tests passed" >> $GITHUB_OUTPUT
          else
            echo "status=Some tests FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Playwright — ${{ steps.result.outputs.status }}"
          to: praveen.c@jseven.in
          from: GitHub Actions
          body: |
            Playwright E2E pipeline completed.

            Result:  ${{ steps.result.outputs.status }}
            Branch:  ${{ github.ref_name }}
            Trigger: ${{ github.event_name }}
            Actor:   ${{ github.actor }}
            Run:     https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
