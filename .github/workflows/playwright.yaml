name: Playwright Tests

on:
  push:
    branches:
      - main
      - stage
      - dev
  pull_request:
    branches:
      - main
      - stage
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      project:
        description: "Project to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - siny-medical
          - siny-cosmetic
          - siny-widget
          - tndi
          - clarus
          - hopemark
          - kronson
          - freedman
          - cvd
      grep:
        description: "Run only tests matching this pattern (e.g. TC-INS, TC-PI-33)"
        required: false
        default: ""

jobs:
  # ── Core clients — run on every push (dev, stage, main) ──────────────────
  # Includes SINY + Clarus + TNDI — actively developed clients.
  # All other clients only run on main/stage/PR.
  test-core:
    # Skip if manual trigger selected a project not in this group
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.project == 'all' ||
      inputs.project == 'siny-medical' ||
      inputs.project == 'siny-cosmetic' ||
      inputs.project == 'siny-widget' ||
      inputs.project == 'clarus' ||
      inputs.project == 'tndi'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        project: [siny-medical, siny-cosmetic, siny-widget, clarus, tndi]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm install --prefix frontend
      - run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.project }}
        # Skip individual matrix jobs that don't match the selected project
        if: inputs.project == 'all' || inputs.project == '' || inputs.project == matrix.project
        run: |
          CMD="npx playwright test --project=${{ matrix.project }} --workers=2"
          if [ -n "${{ inputs.grep }}" ]; then
            CMD="$CMD --grep \"${{ inputs.grep }}\""
          fi
          eval $CMD
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.project }}
          path: test-results/
          retention-days: 14

  # ── Extended suite — runs on dev, main, stage, PRs, and schedule ───────────
  # Clarus is already in test-core so only remaining clients run here.
  test-full:
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage' ||
       github.ref == 'refs/heads/dev' ||
       github.event_name == 'pull_request' || github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.project == 'all' ||
        inputs.project == 'hopemark' || inputs.project == 'kronson' || inputs.project == 'freedman' || inputs.project == 'cvd'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        project: [hopemark, kronson, freedman, cvd]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm install --prefix frontend
      - run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.project }}
        if: inputs.project == 'all' || inputs.project == '' || inputs.project == matrix.project
        run: |
          CMD="npx playwright test --project=${{ matrix.project }} --workers=2"
          if [ -n "${{ inputs.grep }}" ]; then
            CMD="$CMD --grep \"${{ inputs.grep }}\""
          fi
          eval $CMD
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.project }}
          path: test-results/
          retention-days: 14

  # ── Detailed email notification ──────────────────────────────────────────────
  notify:
    needs: [test-core, test-full]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout (needed for the email-report script)
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all test result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all-results/
        continue-on-error: true # artifacts may be missing if a job was skipped

      - name: Generate detailed HTML email report
        id: report
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          node scripts/email-report.mjs all-results/ "$RUN_URL" > email-body.html 2>/dev/null || echo "<p>Could not parse results.</p>" > email-body.html

      - name: Set overall result status
        id: result
        run: |
          if [ "${{ needs.test-core.result }}" == "success" ] && \
             [ "${{ needs.test-full.result }}" != "failure" ]; then
            echo "status=✅ All tests passed" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Some tests FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Send detailed email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Playwright — ${{ steps.result.outputs.status }} | ${{ github.ref_name }} | ${{ github.event_name }}"
          to: praveen.c@jseven.in
          from: GitHub Actions
          html_body: file://email-body.html
