name: Playwright Tests

on:
  push:
    branches:
      - main
      - stage
      - development
  pull_request:
    branches:
      - main
      - stage
  # Daily run at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'
  # Manual trigger with optional project filter
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to run (e.g. siny-medical). Leave blank for all.'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      # Each project runs as a separate parallel job
      fail-fast: false
      matrix:
        project:
          - siny-medical
          - siny-cosmetic
          - tndi
          - clarus
          - hopemark
          - kronson

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests — ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.project }}
          path: |
            test-results/
            allure-results/
          retention-days: 14

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Set result summary
        id: summary
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "status=All tests passed" >> $GITHUB_OUTPUT
          else
            echo "status=Some tests FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Playwright Test Result — ${{ steps.summary.outputs.status }}"
          to: praveen.c@jseven.in,madhan.s@jseven.in
          from: GitHub Actions
          body: |
            Playwright E2E pipeline completed.

            Result:    ${{ steps.summary.outputs.status }}
            Branch:    ${{ github.ref_name }}
            Trigger:   ${{ github.event_name }}
            Actor:     ${{ github.actor }}
            Repo:      ${{ github.repository }}
            Run URL:   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
